<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEA Fishing Intelligence</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #071a24;
    color: white;
}

header {
    background: #0e5c66;
    padding: 18px;
    text-align: center;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 15px;
}

.card {
    background: #123845;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 10px;
}

#map {
    height: 400px;
    border-radius: 10px;
}

.good { color: #2ecc71; }
.warn { color: #f1c40f; }
.bad { color: #ff6b6b; }

.small { font-size: 12px; opacity: 0.8; }
</style>
</head>

<body>

<header>
<h1>🎣 NEA Fishing Intelligence Dashboard</h1>
<p>Live rivers • Bite predictions • Hotspots</p>
</header>

<div class="container">

<div class="card">
<h2>🐟 Catfish Bite Rating</h2>
<h1 id="biteScore">Loading...</h1>
<p id="biteText"></p>
</div>

<div class="card">
<h2>🌊 Water Levels</h2>

<div class="grid">
<div class="card">
<h3>Mississippi (Osceola)</h3>
<p id="osceola">Loading...</p>
</div>

<div class="card">
<h3>Arkansas City Trend</h3>
<p id="arkcity">Loading...</p>
</div>

<div class="card">
<h3>St. Francis (Tulot)</h3>
<p id="tulot">USACE SF126 Active</p>
</div>
</div>

<p class="small">Live USGS + USACE data</p>
</div>

<div class="card">
<h2>🗺️ Fishing Hotspots</h2>
<div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const osceolaSite = "07029180";
const arkSite = "07265450";

async function getUSGS(site) {
  try {
    const url = `https://waterservices.usgs.gov/nwis/iv/?format=json&sites=${site}&parameterCd=00065`;
    const res = await fetch(url);
    const data = await res.json();
    return parseFloat(data.value.timeSeries[0].values[0].value[0].value);
  } catch {
    return null;
  }
}

async function load() {

  const os = await getUSGS(osceolaSite);
  const ar = await getUSGS(arkSite);

  document.getElementById("osceola").innerText = os ? os + " ft" : "No Data";
  document.getElementById("arkcity").innerText = ar ? ar + " ft" : "No Data";

  let score = 60;
  let text = "Moderate Bite";

  if (os && os > 15 && os < 25) score += 20;
  if (ar && os && os > ar) score += 10;

  if (score >= 80) text = "🔥 HOT BITE";
  else if (score >= 65) text = "👍 GOOD BITE";
  else text = "😐 SLOW";

  document.getElementById("biteScore").innerText = score + "/100";
  document.getElementById("biteText").innerText = text;
}

load();
setInterval(load, 300000);

// MAP
const map = L.map('map').setView([35.85, -89.9], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'&copy; OpenStreetMap'
}).addTo(map);

const spots = [
  ["Osceola Dikes", 35.70, -89.99, "Blue cats on seams"],
  ["St Francis Timber", 35.62, -90.25, "Flatheads at night"],
  ["Marked Tree", 35.53, -90.43, "Channel cats"],
  ["Reelfoot Lake", 36.40, -89.35, "Crappie & bass"]
];

spots.forEach(s=>{
  L.marker([s[1], s[2]]).addTo(map)
    .bindPopup(`<b>${s[0]}</b><br>${s[3]}`);
});

</script>

</body>
</html>
